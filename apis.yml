aid: apiary
name: Apiary
description: >-
  Apiary is an API design and documentation platform, now part of Oracle Cloud
  Infrastructure. It uses API Blueprint and Swagger/OpenAPI specifications to
  produce interactive API documentation, mock servers, automated testing, and
  collaborative API design workflows. Apiary enables teams to design APIs
  before writing code, generate documentation automatically, and validate
  API implementations against their specifications.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Documentation
  - API Design
  - Mock Servers
  - API Blueprint
  - Oracle
url: >-
  https://raw.githubusercontent.com/api-evangelist/apiary/refs/heads/main/apis.yml
