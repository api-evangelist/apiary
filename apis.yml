apis:
  - aid: apiary:apiary-api
    name: Apiary API
    description: >-
      The Apiary API provides programmatic access to manage API projects,
      documentation, and team collaboration. It allows creating and updating
      API Blueprint and Swagger/OpenAPI documents, managing team members,
      and integrating Apiary workflows into CI/CD pipelines.
    humanURL: https://apiary.io
    tags:
      - API Blueprint
      - API Design
      - Collaboration
      - Documentation
      - Mock Servers
    properties:
      - type: Documentation
        url: https://help.apiary.io
      - type: GettingStarted
        url: https://help.apiary.io/tools/apiary-cli/
  - aid: apiary:api-blueprint
    name: API Blueprint
    description: >-
      API Blueprint is a high-level API design language created by Apiary for
      designing and documenting web APIs. It uses a Markdown-based syntax
      that is human-readable and machine-parseable, enabling teams to design
      APIs collaboratively and generate documentation, mock servers, and
      tests from a single source of truth.
    humanURL: https://apiblueprint.org
    tags:
      - API Blueprint
      - API Design
      - Documentation
      - Open Source
      - Specification
    properties:
      - type: Documentation
        url: https://apiblueprint.org/documentation/
      - type: GitHubRepository
        url: https://github.com/apiaryio/api-blueprint
      - type: Specification
        url: https://apiblueprint.org/documentation/specification.html
