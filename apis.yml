aid: apiary
name: Apiary
description: >-
  Apiary is an API design and documentation platform, now part of Oracle Cloud
  Infrastructure. With 486,000+ users and 591,000+ APIs managed, it uses API
  Blueprint and Swagger/OpenAPI specifications to produce interactive API
  documentation, mock servers, automated testing, and collaborative API design
  workflows. Apiary enables teams to design APIs before writing code, generate
  documentation automatically, and validate implementations against specifications.
type: Index
